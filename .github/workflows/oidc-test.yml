name: OIDC Token Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://example.com" | jq -r '.value')
          echo "Token received, decoding..."
          # Decode JWT payload (base64url decode the middle part)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "=== OIDC Token Claims ==="
          echo "$PAYLOAD" | jq .
          echo "=== Subject Claim ==="
          echo "$PAYLOAD" | jq -r '.sub'
          echo "=== Repository Claim ==="
          echo "$PAYLOAD" | jq -r '.repository'
          echo "=== Repository Owner Claim ==="
          echo "$PAYLOAD" | jq -r '.repository_owner'
