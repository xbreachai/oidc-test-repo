name: OIDC Token Test
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        run: |
          RESP=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://example.com")
          TOKEN=$(echo "$RESP" | jq -r '.value')
          echo "Token received, decoding..."
          # Decode JWT payload with proper base64url handling
          PAYLOAD_B64=$(echo "$TOKEN" | cut -d. -f2)
          # Pad base64url
          MOD=$((${#PAYLOAD_B64} % 4))
          if [ $MOD -eq 2 ]; then PAYLOAD_B64="${PAYLOAD_B64}=="; elif [ $MOD -eq 3 ]; then PAYLOAD_B64="${PAYLOAD_B64}="; fi
          PAYLOAD=$(echo "$PAYLOAD_B64" | tr '_-' '/+' | base64 -d 2>/dev/null)
          echo "=== OIDC Token Claims ==="
          echo "$PAYLOAD" | python3 -m json.tool
          echo "=== Subject Claim ==="
          echo "$PAYLOAD" | python3 -c "import sys,json; print(json.load(sys.stdin)['sub'])"
          echo "=== Repository Claim ==="
          echo "$PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('repository','N/A'))"
          echo "=== Repository Owner Claim ==="
          echo "$PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('repository_owner','N/A'))"
