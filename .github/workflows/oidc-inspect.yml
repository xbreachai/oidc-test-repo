name: OIDC Token Inspection
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  inspect-token:
    runs-on: ubuntu-latest
    steps:
      - name: Get OIDC Token
        id: get-token
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken();
            // Decode JWT payload (base64url)
            const parts = token.split('.');
            const payload = JSON.parse(Buffer.from(parts[1], 'base64url').toString());
            console.log('=== OIDC Token Claims ===');
            console.log(JSON.stringify(payload, null, 2));
            console.log('=== Subject Claim ===');
            console.log('sub:', payload.sub);
            console.log('repository:', payload.repository);
            console.log('repository_owner:', payload.repository_owner);
            console.log('repository_id:', payload.repository_id);
